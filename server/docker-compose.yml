services:
  postgres:
    image: postgres:16-alpine
    container_name: agents-chat-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agents_chat}
      POSTGRES_USER: ${POSTGRES_USER:-agents_chat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agents_chat}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: agents-chat-redis
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    container_name: agents-chat-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  redis-data:
  minio-data:
